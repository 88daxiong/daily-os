<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily OS</title>
<style>
:root {
  --yellow:#bf8700; --orange:#cf222e; --red:#cf222e; --magenta:#8250df;
  --violet:#8250df; --blue:#0969da; --cyan:#0550ae; --green:#1a7f37;
  --bg:#ffffff; --bg-alt:#f6f8fa; --fg:#1f2328; --fg-dim:#656d76;
  --fg-emph:#1f2328; --border:#d0d7de; --accent:#0969da; --radius:6px;
  --sidebar-w:200px; --topbar-h:52px; --shadow:0 1px 3px rgba(31,35,40,0.04),0 1px 2px rgba(31,35,40,0.06);
}
.theme-dark {
  --bg:#0d1117; --bg-alt:#161b22; --fg:#e6edf3; --fg-dim:#8b949e;
  --fg-emph:#f0f6fc; --border:#30363d; --accent:#58a6ff; --shadow:0 1px 4px rgba(0,0,0,0.3);
  --yellow:#d29922; --orange:#f85149; --red:#f85149; --green:#3fb950; --blue:#58a6ff; --violet:#bc8cff; --cyan:#58a6ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;font-size:13.5px;color:var(--fg);background:var(--bg);display:flex;flex-direction:column;user-select:none}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea{font:inherit;color:var(--fg-emph);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;outline:none}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,textarea,button,select{-webkit-app-region:no-drag;user-select:text}

#topbar{height:var(--topbar-h);display:flex;align-items:center;padding:0 20px 0 80px;background:var(--bg-alt);border-bottom:1px solid var(--border);gap:12px;flex-shrink:0;-webkit-app-region:drag}
.greeting{font-size:14px;font-weight:600;color:var(--fg-emph);white-space:nowrap}
.date-display{font-size:12.5px;color:var(--fg-dim);white-space:nowrap;font-variant-numeric:tabular-nums}
.completion-card{background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.completion-pct{font-size:28px;font-weight:700;color:var(--accent)}
.completion-label{font-size:11px;color:var(--fg-dim);margin-top:2px}
.completion-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.completion-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.topbar-sep{color:var(--border);font-size:14px;font-weight:300}
.topbar-progress{font-size:12px;color:var(--fg-dim);white-space:nowrap;display:flex;align-items:center;gap:6px}
.topbar-progress .tp-pct{font-weight:700;font-variant-numeric:tabular-nums}
.topbar-progress .tp-msg{font-weight:400}
.topbar-progress .tp-bar{width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.topbar-progress .tp-fill{height:100%;border-radius:2px;transition:width .3s}
.save-status{font-size:11px;color:var(--fg-dim);margin-left:auto;transition:opacity .4s;white-space:nowrap}
.save-status.error{color:var(--red)}

#app-body{display:flex;flex:1;overflow:hidden}
#sidebar{width:var(--sidebar-w);background:var(--bg-alt);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px 0;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--fg);cursor:pointer;transition:background .15s;-webkit-app-region:no-drag}
.nav-item:hover{background:rgba(0,0,0,.04)}
.theme-dark .nav-item:hover{background:rgba(255,255,255,.04)}
.nav-item.active{color:var(--accent);font-weight:600;background:rgba(9,105,218,.08)}
.theme-dark .nav-item.active{background:rgba(88,166,255,.1)}
.nav-item .nav-icon{width:18px;text-align:center;font-size:15px}
.nav-item .nav-badge{margin-left:auto;font-size:11px;background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-weight:600}
#main-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 28px}

@media(max-width:900px){#sidebar{width:160px}#main-content{padding:16px 18px}.today-right{width:240px!important}}
@media(max-width:720px){#sidebar{width:52px;overflow:hidden}.nav-item{justify-content:center;padding:10px 0;gap:0}.nav-item span:not(.nav-icon):not(.nav-badge){display:none}#main-content{padding:12px 14px}#today-view{flex-direction:column!important}.today-right{width:100%!important}.stats-row{grid-template-columns:repeat(2,1fr)!important}}

.view-panel{display:none!important}
.view-panel.active{display:block!important}
#today-view.active{display:flex!important;gap:24px}

.today-left{flex:1;min-width:0}
.today-right{width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:0}
.today-right>*{padding:14px 0}
.today-right>*+*{border-top:1px solid var(--border)}
.today-right>*:first-child{padding-top:0}

/* Date nav */
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.date-nav-btn{font-size:16px;padding:4px 8px;border-radius:var(--radius);color:var(--fg-dim);cursor:pointer;transition:color .15s}
.date-nav-btn:hover{color:var(--accent)}
.date-nav-label{font-size:14px;font-weight:600;color:var(--fg-emph)}
.date-nav-today{font-size:11px;padding:3px 10px;background:var(--accent);color:#fff;border-radius:var(--radius);cursor:pointer}

.timeline-now{display:flex;align-items:center;gap:8px;margin:12px 0;font-size:11px;color:var(--accent);font-weight:500}
.timeline-now::before,.timeline-now::after{content:'';flex:1;height:1px;background:var(--accent);opacity:.4}

.task-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;transition:opacity .2s,box-shadow .15s,border-color .15s}
.task-item:not(.done):hover{border-color:var(--accent);box-shadow:0 1px 4px rgba(9,105,218,.08)}
.task-item.done{opacity:.5}
.task-item.done .task-title{text-decoration:line-through}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.task-check:hover{border-color:var(--accent)}
.task-check.checked{background:var(--accent);border-color:var(--accent)}
.task-check.checked::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.task-body{flex:1;min-width:0}
.task-title{font-size:13.5px;color:var(--fg-emph)}
.task-sub{font-size:11.5px;color:var(--fg-dim);margin-top:2px}
.task-time{font-size:11px;color:var(--fg-dim);font-variant-numeric:tabular-nums;flex-shrink:0}
.task-overdue{font-size:10px;color:var(--red);font-weight:600;margin-left:4px}
.task-delete{opacity:0;font-size:14px;color:var(--fg-dim);cursor:pointer;padding:2px 4px;transition:opacity .15s}
.task-item:hover .task-delete{opacity:1}
.task-delete:hover{color:var(--red)}

.quick-add{display:flex;gap:6px;margin-top:10px;align-items:center}
.quick-add input{flex:1;padding:8px 12px;background:var(--bg);border:1px dashed var(--border);border-radius:var(--radius);font-size:12.5px}
.quick-add input:focus{border-style:solid;border-color:var(--accent)}
.quick-add-btn{width:30px;height:30px;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.quick-add-btn:hover{opacity:.85}

.mood-section{text-align:center}
.mood-label{font-size:12px;color:var(--fg-dim);margin-bottom:8px}
.mood-row{display:flex;justify-content:center;gap:8px}
.mood-btn{font-size:22px;padding:4px;border-radius:6px;transition:transform .15s,background .15s;cursor:pointer}
.mood-btn:hover{transform:scale(1.2)}
.mood-btn.active{background:var(--bg-alt);transform:scale(1.2)}
.theme-dark .mood-btn.active{background:rgba(255,255,255,.1)}

.thought-input-area{display:flex;flex-direction:column;gap:6px}
.thought-input-area textarea{min-height:60px;font-size:12.5px}
.thought-save-btn{align-self:flex-end;padding:5px 14px;background:var(--accent);color:#fff;border-radius:var(--radius);font-size:12px;font-weight:500}
.thought-list{max-height:220px;overflow-y:auto}
.thought-item{padding:8px 10px;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;font-size:12px;line-height:1.5;position:relative}
.thought-meta{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--fg-dim);margin-bottom:4px}
.thought-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.thought-item:hover .thought-actions{opacity:1}
.thought-actions button{font-size:11px;color:var(--fg-dim);padding:2px 4px}
.thought-actions button:hover{color:var(--accent)}


.draft-section{margin-bottom:24px}
.draft-section-title{font-size:13px;font-weight:600;color:var(--fg-emph);margin-bottom:10px}
.draft-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;transition:opacity .2s,border-color .15s}
.draft-item:not(.done):hover{border-color:var(--accent)}
.draft-item.done{opacity:.55}
.draft-item.done .draft-title{text-decoration:line-through}
.draft-tag{font-size:10.5px;padding:2px 8px;border-radius:10px;font-weight:500;flex-shrink:0}
.draft-body{flex:1;min-width:0}
.draft-title{font-size:13px;color:var(--fg-emph)}
.draft-sub{font-size:11px;color:var(--fg-dim);margin-top:1px}
.draft-actions{display:flex;gap:6px;flex-shrink:0}
.draft-btn{font-size:11.5px;padding:4px 10px;border-radius:var(--radius);transition:background .15s}
.draft-btn-add{background:rgba(9,105,218,.08);color:var(--accent)}
.draft-btn-add:hover{background:rgba(9,105,218,.15)}
.draft-btn-remove{background:rgba(207,34,46,.06);color:var(--red)}
.draft-btn-remove:hover{background:rgba(207,34,46,.12)}
.draft-btn-edit{color:var(--fg-dim)}
.draft-btn-edit:hover{color:var(--accent)}
.draft-btn-del{color:var(--fg-dim)}
.draft-btn-del:hover{color:var(--red)}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:10px}
.stat-icon{font-size:20px;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-info{text-align:left}
.stat-value{font-size:22px;font-weight:700;line-height:1.1}
.stat-label{font-size:10.5px;color:var(--fg-dim);margin-top:2px}
.insight-section{margin-bottom:20px}
.insight-title{font-size:13px;font-weight:700;color:var(--fg-emph);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.insight-title::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px}

/* Month calendar grid */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;max-width:380px}
.month-grid-header{font-size:9px;color:var(--fg-dim);text-align:center;padding:2px 0;font-weight:600}
.month-cell{border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;position:relative;padding:4px 2px;min-height:34px;transition:transform .1s}
.month-cell:not(.empty):hover{transform:scale(1.08)}
.month-cell.no-data{background:transparent;border:1px dashed var(--border)}
.month-cell.no-data .cell-day{color:var(--fg-dim);font-weight:400}
.month-cell.has-data{border:1px solid var(--border)}
.month-cell.empty{border:none}
.month-cell .cell-day{font-size:10px;font-weight:600;color:var(--fg-emph);line-height:1}
.month-cell .cell-ratio{font-size:8.5px;font-weight:500;line-height:1;margin-top:1px}
.month-cell .cell-badge{font-size:7px;font-weight:700;letter-spacing:.2px;line-height:1;margin-top:2px;text-transform:uppercase}
.month-cell.lv0{background:var(--bg-alt)}
.month-cell.lv1{background:#dafbe1}
.month-cell.lv2{background:#aceebb}
.month-cell.lv3{background:#6fdd8b}
.month-cell.lv4{background:#4ac26b}
.month-cell.lv5{background:#2da44e}
.month-cell.lv5 .cell-day,.month-cell.lv5 .cell-ratio,.month-cell.lv5 .cell-badge{color:#fff!important}
.theme-dark .month-cell.lv0{background:var(--bg-alt)}
.theme-dark .month-cell.lv1{background:#0e4429}
.theme-dark .month-cell.lv2{background:#006d32}
.theme-dark .month-cell.lv3{background:#26a641}
.theme-dark .month-cell.lv4{background:#39d353}
.theme-dark .month-cell.lv5{background:#39d353}
.month-cell.today-cell{border-color:var(--accent);border-width:2px}

.chart-container{background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.chart-container canvas{width:100%}
.tag-stats{display:flex;flex-direction:column;gap:10px}
.tag-stat-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius)}
.tag-stat-name{font-size:12px;width:55px;font-weight:600;flex-shrink:0}
.tag-stat-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.tag-stat-fill{height:100%;border-radius:4px;transition:width .3s}
.tag-stat-pct{font-size:11px;color:var(--fg-dim);width:50px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.thought-history-item{padding:10px 12px;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.thought-history-date{font-size:10.5px;color:var(--fg-dim);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.thought-history-content{font-size:12.5px;color:var(--fg);line-height:1.5}

.template-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.template-table th{text-align:left;font-size:12px;font-weight:700;color:var(--fg-emph);padding:10px 12px;border-bottom:2px solid var(--border);background:var(--bg)}
.template-table td{padding:10px 12px;font-size:12.5px;border-bottom:1px solid var(--border);vertical-align:middle}
.template-table tr:last-child td{border-bottom:none}
.tpl-time{font-variant-numeric:tabular-nums;color:var(--fg-dim)}
.toggle-switch{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;display:inline-block}
.toggle-switch.on{background:var(--accent)}
.toggle-switch::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s}
.toggle-switch.on::after{transform:translateX(16px)}
.tag-manager{margin-top:24px;padding:16px;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius)}
.tag-manager-title{font-size:13px;font-weight:600;color:var(--fg-emph);margin-bottom:10px}
.tag-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.tag-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:500}
.tag-chip-del{cursor:pointer;opacity:.6;font-size:13px}
.tag-chip-del:hover{opacity:1}
.color-palette{display:flex;gap:6px}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:var(--fg-emph)}

.settings-group{background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.settings-group-title{font-size:13px;font-weight:600;color:var(--fg-emph);margin-bottom:12px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.setting-row+.setting-row{border-top:1px solid var(--border)}
.setting-label{font-size:12.5px;color:var(--fg)}
.setting-value input{width:180px}
.setting-value select{padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--fg-emph);font:inherit;outline:none}
.settings-actions{display:flex;gap:10px;margin-top:8px}
.btn{padding:8px 18px;border-radius:var(--radius);font-size:12.5px;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--bg);border:1px solid var(--border);color:var(--fg)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:24px;min-width:320px;max-width:480px;box-shadow:var(--shadow)}
.modal-title{font-size:15px;font-weight:600;color:var(--fg-emph);margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

.section-label{font-size:11px;font-weight:700;color:var(--fg-emph);letter-spacing:.3px;margin-bottom:8px}
.inline-form{display:flex;gap:8px;align-items:center;padding:10px 12px;background:var(--bg-alt);border:1px dashed var(--border);border-radius:var(--radius);margin-top:10px;flex-wrap:wrap}
.inline-form input{flex:1;min-width:80px}
.inline-form select{padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--fg-emph);font:inherit}

/* Smart time picker */
.time-picker{display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:12px}
.time-picker select,.time-picker input{padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--fg-emph);font:inherit;font-size:12px}
.time-picker input[type="number"]{width:52px;text-align:center}
.time-picker input[type="time"]{width:100px}
.time-picker .tp-label{color:var(--fg-dim);font-size:11px;white-space:nowrap}
.time-picker .tp-mode{font-weight:500;min-width:70px}
</style>
</head>
<body>
<div id="topbar">
  <span class="date-display" id="date-display"></span>
  <span class="greeting" id="greeting">你好，User</span>
  <span class="topbar-sep">·</span>
  <span class="topbar-progress" id="topbar-progress"></span>
  <span class="save-status" id="save-status"></span>
</div>
<div id="app-body">
  <div id="sidebar">
    <div class="nav-item active" data-view="today" onclick="switchView('today')"><span class="nav-icon">☀</span><span>今天</span><span class="nav-badge" id="nav-badge-today" style="display:none">0</span></div>
    <div class="nav-item" data-view="drafts" onclick="switchView('drafts')"><span class="nav-icon">📋</span><span>草稿箱</span></div>
    <div class="nav-item" data-view="insights" onclick="switchView('insights')"><span class="nav-icon">📊</span><span>数据洞察</span></div>
    <div class="nav-item" data-view="templates" onclick="switchView('templates')"><span class="nav-icon">⚙</span><span>模板管理</span></div>
    <div class="nav-item" data-view="settings" onclick="switchView('settings')"><span class="nav-icon">🔧</span><span>偏好设置</span></div>
    <div style="flex:1"></div>
    <div style="padding:8px 20px;font-size:10px;color:var(--border)">Daily OS v1.0</div>
  </div>
  <div id="main-content">
    <!-- ① Today -->
    <div id="today-view" class="view-panel active">
      <div class="today-left">
        <div class="date-nav" id="date-nav"></div>
        <div id="task-list"></div>
        <div class="quick-add" id="quick-add">
          <input type="text" id="quick-add-input" placeholder="快速添加任务… 回车确认" onkeydown="if(event.key==='Enter')quickAddTask()">
          <button class="quick-add-btn" onclick="quickAddTask()">+</button>
        </div>
      </div>
      <div class="today-right">
        <div class="mood-section"><div class="mood-label">当日心情</div><div class="mood-row" id="mood-row"></div></div>
        <div class="thought-input-area">
          <div class="section-label">记录想法</div>
          <textarea id="thought-input" placeholder="此刻在想什么…"></textarea>
          <button class="thought-save-btn" onclick="saveThought()">保存</button>
        </div>
        <div><div class="section-label">当日想法</div><div class="thought-list" id="thought-list"></div></div>
        <div class="completion-card">
          <div class="completion-pct" id="completion-pct">0%</div>
          <div class="completion-label">完成率</div>
          <div class="completion-bar"><div class="completion-fill" id="completion-fill"></div></div>
        </div>
      </div>
    </div>
    <!-- ② Drafts -->
    <div id="drafts-view" class="view-panel">
      <div class="draft-section">
        <div class="draft-section-title">自由草稿</div>
        <div id="free-drafts-list"></div>

<input type="file" id="import-file-input" accept=".json" style="display:none">

<script>
let data=null, settings=null, today='', viewingDate='', currentView='today', selectedNewTagColor='#dc322f';
const MOODS=['😔','😐','🙂','😊','🤩'];
const PALETTE_COLORS=['#cf222e','#0969da','#0550ae','#1a7f37','#bf8700','#bc4c00','#8250df','#e16f24'];
const WEEKDAYS=['日','一','二','三','四','五','六'];

async function init(){
  if(window.dailyOS){
    data=await window.dailyOS.getData(); settings=await window.dailyOS.getSettings();
    today=await window.dailyOS.getToday(); const st=await window.dailyOS.getTheme();
    applyTheme(settings.themeMode,st);
    window.dailyOS.onThemeChanged(t=>applyTheme(settings.themeMode,t));
  }else{
    today=new Date().toISOString().split('T')[0];
    data=loadLocalData();
    settings={username:'User',globalShortcut:'Alt+Space',launchAtLogin:false,themeMode:'light'};
  }
  viewingDate=today;
  ensureDay(today);
  updateGreeting(); updateDateDisplay(); startClock(); renderAll(); setupKeyboard();
  setInterval(checkNewDay,60000);
}

function loadLocalData(){
  try{const s=localStorage.getItem('dailyos-data');if(s)return JSON.parse(s);}catch(e){}
  return {tags:[{id:'t1',name:'健康',color:'#859900'},{id:'t2',name:'职业',color:'#268bd2'},{id:'t3',name:'生活',color:'#cb4b16'},{id:'t4',name:'临时待办',color:'#6c71c4'}],templates:[],days:{},drafts:[]};
}

let saveTimer=null;
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(doSave,500)}
async function doSave(){
  const el=document.getElementById('save-status');
  try{
    if(window.dailyOS){const r=await window.dailyOS.saveData(data);if(!r.ok)throw new Error(r.error);window.dailyOS.updateBadge();}
    else localStorage.setItem('dailyos-data',JSON.stringify(data));
    el.textContent='已自动保存';el.classList.remove('error');el.style.opacity=1;setTimeout(()=>{el.style.opacity=0},2000);
  }catch(e){el.textContent='保存失败';el.classList.add('error');el.style.opacity=1;}
}

function ensureDay(dateStr){
  if(!data.days)data.days={};
  if(!data.days[dateStr]){
    // Only populate templates for today or future dates; past days get empty slate
    const isTodayOrFuture=dateStr>=today;
    const tasks=isTodayOrFuture
      ? data.templates.filter(t=>t.defaultShow).map(t=>({
          id:uid(),title:t.title,sub:t.sub||'',time:t.time||'',endTime:t.endTime||'',
          tagId:t.tagId||'',done:false,source:'template'
        }))
      : [];
    data.days[dateStr]={tasks,mood:-1,thoughts:[]};
    if(dateStr===today){
      const yd=prevDay(today);
      if(data.days[yd]){
        for(const t of data.days[yd].tasks.filter(t=>!t.done)){
          if(!data.drafts.some(d=>d.title===t.title+'（昨日未完）'))
            data.drafts.push({id:uid(),title:t.title+'（昨日未完）',sub:t.sub||'',time:t.time||'',endTime:t.endTime||'',tagId:t.tagId||'',createdAt:new Date().toISOString()});
        }
      }
    }
    scheduleSave();
  }
}

function checkNewDay(){const n=new Date().toISOString().split('T')[0];if(n!==today){today=n;ensureDay(today);if(viewingDate===prevDay(today)){viewingDate=today;}updateDateDisplay();renderAll();}}
function prevDay(d){const dt=new Date(d);dt.setDate(dt.getDate()-1);return dt.toISOString().split('T')[0]}
function nextDay(d){const dt=new Date(d);dt.setDate(dt.getDate()+1);return dt.toISOString().split('T')[0]}
function applyTheme(m,s){document.body.classList.toggle('theme-dark',m==='dark'||(m==='system'&&s==='dark'))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function getTag(id){return data.tags.find(t=>t.id===id)||null}
function dayData(d){return data.days[d||viewingDate]||{tasks:[],mood:-1,thoughts:[]}}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtTimeRange(t,e){if(!t)return '';return e?`${t} - ${e}`:t;}

// ═══ SMART TIME PICKER ═══
const TIME_PERIODS={morning:{label:'上午',start:'08:00',end:'12:00'},afternoon:{label:'下午',start:'13:00',end:'17:00'},evening:{label:'晚上',start:'18:00',end:'22:00'}};

function initTimePicker(containerId,initTime,initEndTime){
  const el=document.getElementById(containerId);if(!el)return;
  // Detect initial mode from existing values
  let mode='range';
  if(!initTime&&!initEndTime)mode='period';
  el.dataset.mode=mode;
  renderTimePicker(containerId,initTime,initEndTime);
}

function renderTimePicker(containerId,initTime,initEndTime){
  const el=document.getElementById(containerId);if(!el)return;
  const mode=el.dataset.mode||'period';
  const modeSelect=`<select class="tp-mode" onchange="switchTimeMode('${containerId}',this.value)">
    <option value="period" ${mode==='period'?'selected':''}>时段</option>
    <option value="range" ${mode==='range'?'selected':''}>起止时间</option>
    <option value="duration" ${mode==='duration'?'selected':''}>开始+时长</option>
    <option value="offset" ${mode==='offset'?'selected':''}>从现在起</option>
  </select>`;

  let fields='';
  if(mode==='period'){
    fields=`<select data-field="period">
      <option value="">不设时间</option>
      <option value="morning" ${initTime==='08:00'&&initEndTime==='12:00'?'selected':''}>上午 (08:00-12:00)</option>
      <option value="afternoon" ${initTime==='13:00'&&initEndTime==='17:00'?'selected':''}>下午 (13:00-17:00)</option>
      <option value="evening" ${initTime==='18:00'&&initEndTime==='22:00'?'selected':''}>晚上 (18:00-22:00)</option>
    </select>`;
  }else if(mode==='range'){
    fields=`<span class="tp-label">开始</span><input type="time" data-field="start" value="${initTime||''}">
    <span class="tp-label">结束</span><input type="time" data-field="end" value="${initEndTime||''}">`;
  }else if(mode==='duration'){
    fields=`<span class="tp-label">开始</span><input type="time" data-field="start" value="${initTime||''}">
    <span class="tp-label">持续</span><input type="number" data-field="dur-h" min="0" max="23" value="1" style="width:46px"><span class="tp-label">时</span>
    <input type="number" data-field="dur-m" min="0" max="59" value="0" step="5" style="width:46px"><span class="tp-label">分</span>`;
  }else if(mode==='offset'){
    fields=`<span class="tp-label">从现在起</span>
    <input type="number" data-field="off-h" min="0" max="23" value="0" style="width:46px"><span class="tp-label">时</span>
    <input type="number" data-field="off-m" min="0" max="59" value="30" step="5" style="width:46px"><span class="tp-label">分后</span>
    <span class="tp-label">持续</span><input type="number" data-field="dur-h" min="0" max="23" value="1" style="width:46px"><span class="tp-label">时</span>
    <input type="number" data-field="dur-m" min="0" max="59" value="0" step="5" style="width:46px"><span class="tp-label">分</span>`;
  }
  el.innerHTML=modeSelect+fields;
}

function switchTimeMode(containerId,mode){
  const el=document.getElementById(containerId);if(!el)return;
  el.dataset.mode=mode;
  renderTimePicker(containerId,'','');
}

function resolveTimePicker(containerId){
  const el=document.getElementById(containerId);if(!el)return {time:'',endTime:''};
  const mode=el.dataset.mode||'period';
  const f=sel=>el.querySelector(`[data-field="${sel}"]`);

  if(mode==='period'){
    const v=f('period')?.value;if(!v)return {time:'',endTime:''};
    const p=TIME_PERIODS[v];return {time:p.start,endTime:p.end};
  }
  if(mode==='range'){
    return {time:f('start')?.value||'',endTime:f('end')?.value||''};
  }
  if(mode==='duration'){
    const start=f('start')?.value||'';if(!start)return {time:'',endTime:''};
    const h=parseInt(f('dur-h')?.value)||0,m=parseInt(f('dur-m')?.value)||0;
    return {time:start,endTime:addMinutes(start,h*60+m)};
  }
  if(mode==='offset'){
    const now=new Date();
    const oh=parseInt(f('off-h')?.value)||0,om=parseInt(f('off-m')?.value)||0;
    const startMin=now.getHours()*60+now.getMinutes()+oh*60+om;
    const start=minToTime(startMin);
    const dh=parseInt(f('dur-h')?.value)||0,dm=parseInt(f('dur-m')?.value)||0;
    const dur=dh*60+dm;
    return {time:start,endTime:dur>0?addMinutes(start,dur):''};
  }
  return {time:'',endTime:''};
}

function addMinutes(timeStr,mins){
  const [h,m]=timeStr.split(':').map(Number);
  const total=h*60+m+mins;
  return minToTime(total);
}
function minToTime(total){
  total=Math.max(0,Math.min(total,1439));
  return `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}

function updateGreeting(){
  const h=new Date().getHours();
  let g=h<6?'深夜了':h<12?'早上好':h<14?'中午好':h<18?'下午好':'晚上好';
  document.getElementById('greeting').textContent=`${g}，${settings.username||'User'}`;
}
function updateDateDisplay(){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1,d=n.getDate(),w=WEEKDAYS[n.getDay()];
  document.getElementById('date-display').textContent=`${y} 年 ${m} 月 ${d} 日  周${w}  ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
function startClock(){setInterval(updateDateDisplay,10000)}

function switchView(name){
  currentView=name;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.view===name));
  document.querySelectorAll('.view-panel').forEach(el=>el.classList.toggle('active',el.id===name+'-view'));
  if(name==='today')renderToday();if(name==='drafts')renderDrafts();if(name==='insights')renderInsights();if(name==='templates')renderTemplates();if(name==='settings')renderSettings();
}

function setupKeyboard(){
  document.addEventListener('keydown',e=>{
    if(e.key==='n'&&!e.metaKey&&!e.ctrlKey&&!isInputFocused()){e.preventDefault();switchView('drafts');setTimeout(()=>document.getElementById('draft-add-title')?.focus(),100);}
    if(e.metaKey||e.ctrlKey){const vs=['today','drafts','insights','templates','settings'],i=parseInt(e.key)-1;if(i>=0&&i<vs.length){e.preventDefault();switchView(vs[i]);}}
    if(e.key==='Escape'){closeModal();document.activeElement?.blur();}
  });
}
function isInputFocused(){const t=document.activeElement?.tagName;return t==='INPUT'||t==='TEXTAREA'||t==='SELECT';}

function renderAll(){renderToday();updateNavBadge();}
function updateNavBadge(){
  const td=dayData(today),undone=td.tasks.filter(t=>!t.done).length,badge=document.getElementById('nav-badge-today');
  if(undone>0){badge.textContent=undone;badge.style.display='';}else badge.style.display='none';
}

function updateTopbarProgress(pct,done,total){
  const el=document.getElementById('topbar-progress');
  if(!total){el.innerHTML='';return;}
  const color=pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--red)';
  const isToday=viewingDate===today;
  const left=total-done;
  let msg='';
  if(!isToday){
    msg=`${done}/${total} · ${completionWord(pct)}`;
  }else if(pct>=100)msg=`${done}/${total} Perfect! 全部搞定 🎉`;
  else if(pct>=80)msg=`已完成 ${done}/${total}，Great! 💪`;
  else if(pct>=60)msg=`已完成 ${done}/${total}，还剩 ${left} 项`;
  else if(done>0)msg=`已完成 ${done}/${total}，继续冲`;
  else msg=`今天 ${total} 项任务，开始吧`;
  el.innerHTML=`<span class="tp-msg" style="color:${color}">${msg}</span>`;
}
function completionWord(pct){if(pct>=100)return 'Perfect';if(pct>=80)return 'Great';if(pct>=60)return 'Good';if(pct>=30)return 'OK';return 'Low';}

// ═══ TODAY ═══
function renderDateNav(){
  const d=new Date(viewingDate),y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate(),w=WEEKDAYS[d.getDay()];
  const isToday=viewingDate===today;
  const canNext=viewingDate<today;
  document.getElementById('date-nav').innerHTML=`
    <button class="date-nav-btn" onclick="navDate(-1)">◀</button>
    <span class="date-nav-label">${y}年${m}月${dd}日 周${w}</span>
    ${canNext?`<button class="date-nav-btn" onclick="navDate(1)">▶</button>`:`<span style="width:28px"></span>`}
    ${!isToday?`<button class="date-nav-today" onclick="navToToday()">回到今天</button>`:''}
  `;
}
function navDate(dir){
  const next=dir>0?nextDay(viewingDate):prevDay(viewingDate);
  if(next>today)return;
  viewingDate=next;
  ensureDay(viewingDate);
  renderToday();
}
function navToToday(){viewingDate=today;renderToday();}

let showCompleted=false;

function renderToday(){
  renderDateNav();
  const dd=dayData(viewingDate),container=document.getElementById('task-list');
  const now=new Date(),nowStr=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const isToday=viewingDate===today;

  // Split into done / overdue / active
  const doneTasks=dd.tasks.filter(t=>t.done);
  const activeTasks=dd.tasks.filter(t=>!t.done);
  const isOverdue=t=>{const et=t.endTime||t.time;return isToday&&et&&et<nowStr;};
  const overdueTasks=activeTasks.filter(isOverdue);
  const normalTasks=activeTasks.filter(t=>!isOverdue(t));

  const noTime=normalTasks.filter(t=>!t.time);
  const timed=normalTasks.filter(t=>t.time).sort((a,b)=>a.time.localeCompare(b.time));

  let html='';

  // ── Completed (collapsed by default) ──
  if(doneTasks.length){
    html+=`<div style="margin-bottom:10px">
      <button onclick="toggleCompleted()" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-dim);padding:6px 10px;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;width:100%">
        <span style="font-size:10px">${showCompleted?'▼':'▶'}</span>
        <span>已完成</span>
        <span style="background:var(--green);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600">${doneTasks.length}</span>
      </button>
      ${showCompleted?`<div style="margin-top:4px">${doneTasks.map(t=>renderTaskItem(t,nowStr,isToday)).join('')}</div>`:''}
    </div>`;
  }

  // ── Overdue ──
  if(overdueTasks.length){
    const sorted=overdueTasks.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    html+=`<div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:600;color:var(--red);padding:4px 0;display:flex;align-items:center;gap:6px">
        <span>⏰ 已过期</span><span style="font-size:10px;font-weight:400;color:var(--fg-dim)">${overdueTasks.length} 项</span>
      </div>
      ${sorted.map(t=>renderTaskItem(t,nowStr,isToday)).join('')}
    </div>`;
  }

  // ── Active tasks ──
  for(const task of noTime) html+=renderTaskItem(task,nowStr,isToday);
  if(noTime.length&&timed.length) html+='<div style="height:6px"></div>';

  let tlPlaced=false;
  for(const task of timed){
    if(isToday&&!tlPlaced&&task.time>nowStr){html+=`<div class="timeline-now">现在 ${nowStr}</div>`;tlPlaced=true;}
    html+=renderTaskItem(task,nowStr,isToday);
  }
  if(isToday&&!tlPlaced&&timed.length) html+=`<div class="timeline-now">现在 ${nowStr}</div>`;

  if(!dd.tasks.length) html=`<div style="text-align:center;padding:40px 0;color:var(--fg-dim)">这天没有任务。</div>`;
  else if(!activeTasks.length&&doneTasks.length&&!showCompleted){
    html+=`<div style="text-align:center;padding:28px 0;color:var(--green);font-size:13px">
      <div style="font-size:28px;margin-bottom:6px">🎉</div>
      <div style="font-weight:600">今日任务全部完成！</div>
      <div style="font-size:11px;color:var(--fg-dim);margin-top:4px">好好休息，明天继续加油</div>
    </div>`;
  }
  container.innerHTML=html;

  renderMood(dd.mood); renderThoughts(dd.thoughts||[]);
  const total=dd.tasks.length,done=doneTasks.length,pct=total?Math.round(done/total*100):0;
  const pctColor=pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--red)';
  document.getElementById('completion-pct').textContent=pct+'%';
  document.getElementById('completion-pct').style.color=pctColor;
  document.getElementById('completion-fill').style.width=pct+'%';
  document.getElementById('completion-fill').style.background=pctColor;
  updateTopbarProgress(pct,done,total);

let showDraftCompleted=false;

function renderDrafts(){
  populateTagSelect('draft-add-tag');
  initTimePicker('draft-time-picker','','');
  populateDraftTargetSelect();
  const td=dayData(today);

  // Build set of draft titles completed in ANY past day
  const doneInHistory=new Set();
  for(const [ds,dd] of Object.entries(data.days||{})){
    if(ds===today) continue; // today handled separately
    for(const t of dd.tasks||[]){
      if(t.done) doneInHistory.add(t.title);
    }
  }

  // Build map: draftId -> {taskId, done} in TODAY
  const draftInToday={};
  for(const task of td.tasks){
    if(task.source==='draft'||task.source==='quick'){
      const draft=data.drafts.find(d=>d.title===task.title);
      if(draft) draftInToday[draft.id]={taskId:task.id,done:task.done};
    }
  }

  const freeList=document.getElementById('free-drafts-list');
  // Filter out drafts already completed in past days
  const freeDrafts=(data.drafts||[]).filter(d=>!doneInHistory.has(d.title));

  // Split: active vs completed-today
  const activeDrafts=freeDrafts.filter(d=>{const info=draftInToday[d.id];return !info?.done;});
  const doneDrafts=freeDrafts.filter(d=>{const info=draftInToday[d.id];return !!info?.done;});

  let html='';
  // Completed toggle
  if(doneDrafts.length){
    html+=`<div style="margin-bottom:8px">
      <button onclick="toggleDraftCompleted()" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-dim);padding:5px 10px;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer">
        <span style="font-size:10px">${showDraftCompleted?'▼':'▶'}</span><span>已完成</span>
        <span style="background:var(--green);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600">${doneDrafts.length}</span>
      </button>
      ${showDraftCompleted?`<div style="margin-top:4px">${doneDrafts.map(d=>{const info=draftInToday[d.id];return renderDraftItem(d,true,info.taskId,true);}).join('')}</div>`:''}
    </div>`;
  }
  // Active drafts
  if(!activeDrafts.length&&!doneDrafts.length) html+='<div style="font-size:12px;color:var(--fg-dim);padding:8px 0;">暂无草稿</div>';
  else html+=activeDrafts.map(d=>{const info=draftInToday[d.id];return renderDraftItem(d,!!info,info?.taskId,false);}).join('');
  freeList.innerHTML=html;

  // Template candidates
  const todayDoneTitles=new Set(td.tasks.filter(t=>t.done).map(t=>t.title));
  const todayTitles=new Set(td.tasks.map(t=>t.title));
  const candidates=data.templates.filter(t=>{if(t.defaultShow)return false;if(todayDoneTitles.has(t.title))return false;return true;});
  const tplList=document.getElementById('template-drafts-list');
  if(!candidates.length) tplList.innerHTML='<div style="font-size:12px;color:var(--fg-dim);padding:8px 0;">暂无候补模板</div>';
  else tplList.innerHTML=candidates.map(t=>renderTemplateDraftItem(t,todayTitles.has(t.title))).join('');
}

function populateDraftTargetSelect(){
  const sel=document.getElementById('draft-add-target');if(!sel)return;
  const d=new Date(today);
  let html=`<option value="">仅草稿箱</option><option value="${today}">今天</option>`;
  for(let i=1;i<=7;i++){
    const nd=new Date(d);nd.setDate(nd.getDate()+i);
    const ds=nd.toISOString().split('T')[0];
    const label=i===1?'明天':`${nd.getMonth()+1}/${nd.getDate()} (${i}天后)`;
    html+=`<option value="${ds}">${label}</option>`;
  }

  sel.innerHTML=html;

    if(this.value==='custom'){
      const pick=prompt('输入日期（格式 YYYY-MM-DD）：',nextDay(today));

function renderStatsCards(){
  const allDays=Object.keys(data.days||{}).sort();
  // Exclude today from streak/avg (still in progress)
  const pastDays=allDays.filter(d=>d<today);
  // Streak: ≥80% completion counts (Great+Perfect), only past days
  let streak=0;for(let i=pastDays.length-1;i>=0;i--){const t=data.days[pastDays[i]].tasks||[];if(t.length){const pct=t.filter(x=>x.done).length/t.length;if(pct>=0.8)streak++;else break;}else break;}
  let best=0,tmp=0;for(const d of pastDays){const t=data.days[d].tasks||[];if(t.length){const pct=t.filter(x=>x.done).length/t.length;if(pct>=0.8){tmp++;best=Math.max(best,tmp);}else tmp=0;}else tmp=0;}
  // If today also qualifies, extend current streak (but don't break it)
  const todayTasks=data.days[today]?.tasks||[];
  if(todayTasks.length){const tp=todayTasks.filter(x=>x.done).length/todayTasks.length;if(tp>=0.8){streak++;best=Math.max(best,streak);}}
  // Avg: past days only (completed days)
  let totP=0,cnt=0;for(const d of pastDays){const t=data.days[d].tasks||[];if(t.length){totP+=t.filter(x=>x.done).length/t.length;cnt++;}}
  const avg=cnt?Math.round(totP/cnt*100):0;
  let totTh=0;for(const d of allDays)totTh+=(data.days[d].thoughts||[]).length;
  const perfectDays=pastDays.filter(d=>{const t=data.days[d].tasks||[];return t.length&&t.every(x=>x.done);}).length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(26,127,55,.1);color:#1a7f37">📊</div>
      <div class="stat-info"><div class="stat-value" style="color:#1a7f37;font-size:22px">${avg}%</div><div class="stat-label">平均完成率</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(191,135,0,.1);color:#bf8700">🔥</div>
      <div class="stat-info"><div class="stat-value" style="color:#bf8700">${streak}<span style="font-size:11px;color:var(--fg-dim)"> / ${best}</span></div><div class="stat-label">连续达标 / 最佳</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(9,105,218,.1);color:#0969da">📅</div>
      <div class="stat-info"><div class="stat-value" style="color:#0969da">${allDays.length}<span style="font-size:11px;color:var(--fg-dim)"> (${perfectDays}⭐)</span></div><div class="stat-label">累计天数 (满分)</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(130,80,223,.1);color:#8250df">💭</div>
      <div class="stat-info"><div class="stat-value" style="color:#8250df">${totTh}</div><div class="stat-label">思考条数</div></div>
    </div>`;
}

function completionBadge(pct,total){
  if(!total)return '';
  if(pct>=1)return `<span class="cell-badge" style="color:var(--green)">Perfect</span>`;
  if(pct>=0.8)return `<span class="cell-badge" style="color:#2aa198">Great</span>`;
  if(pct>=0.6)return `<span class="cell-badge" style="color:var(--yellow)">Good</span>`;
  if(pct>=0.3)return `<span class="cell-badge" style="color:var(--orange)">OK</span>`;
  if(pct>0)return `<span class="cell-badge" style="color:var(--red)">Low</span>`;
  return `<span class="cell-badge" style="color:var(--fg-dim)">Miss</span>`;
}

function renderTrendChart(){
  const canvas=document.getElementById('trend-canvas'),ctx=canvas.getContext('2d'),isDark=document.body.classList.contains('theme-dark');
  const w=canvas.parentElement.clientWidth-32;canvas.width=w;canvas.height=180;ctx.clearRect(0,0,w,180);
  const pL=36,pR=12,pT=16,pB=28,cW=w-pL-pR,cH=180-pT-pB;
  const lineColor=isDark?'#58a6ff':'#0969da';
  const dotFill=isDark?'#58a6ff':'#0969da';
  const bgLine=isDark?'#30363d':'#d0d7de';
  const labelColor=isDark?'#8b949e':'#656d76';
  const bgCanvas=isDark?'#0d1117':'#ffffff';

  // Gather data points; null = no data for that day
  const pts=[];for(let i=13;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0],dd=data.days?.[ds];
    let p=null;if(dd&&dd.tasks?.length)p=dd.tasks.filter(t=>t.done).length/dd.tasks.length*100;
    pts.push({pct:p,label:`${d.getMonth()+1}/${d.getDate()}`});}

  // Grid lines
  ctx.strokeStyle=bgLine;ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pT+(cH/4)*i;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cW,y);ctx.stroke();ctx.fillStyle=labelColor;ctx.font='10px -apple-system,sans-serif';ctx.textAlign='right';ctx.fillText((100-i*25)+'%',pL-6,y+4);}
  ctx.textAlign='center';ctx.fillStyle=labelColor;for(let i=0;i<pts.length;i+=2)ctx.fillText(pts[i].label,pL+(cW/(pts.length-1))*i,180-6);

  // Line — skip null points (break the line)
  ctx.strokeStyle=lineColor;ctx.lineWidth=2;ctx.lineJoin='round';
  let drawing=false;
  for(let i=0;i<pts.length;i++){
    if(pts[i].pct===null){drawing=false;continue;}
    const x=pL+(cW/(pts.length-1))*i,y=pT+cH-(pts[i].pct/100)*cH;
    if(!drawing){ctx.beginPath();ctx.moveTo(x,y);drawing=true;}else{ctx.lineTo(x,y);}
  }
  if(drawing)ctx.stroke();

  // Area fill under the line
  drawing=false;let segStart=-1;
  for(let i=0;i<pts.length;i++){
    if(pts[i].pct===null){
      if(drawing){
        ctx.lineTo(pL+(cW/(pts.length-1))*(i-1),pT+cH);ctx.lineTo(pL+(cW/(pts.length-1))*segStart,pT+cH);ctx.closePath();
        const grd=ctx.createLinearGradient(0,pT,0,pT+cH);grd.addColorStop(0,isDark?'rgba(88,166,255,.15)':'rgba(9,105,218,.1)');grd.addColorStop(1,'rgba(9,105,218,0)');ctx.fillStyle=grd;ctx.fill();
      }
      drawing=false;continue;
    }
    const x=pL+(cW/(pts.length-1))*i,y=pT+cH-(pts[i].pct/100)*cH;
    if(!drawing){ctx.beginPath();ctx.moveTo(x,y);segStart=i;drawing=true;}else{ctx.lineTo(x,y);}
  }
  if(drawing){
    const lastI=pts.length-1;for(let j=lastI;j>=0;j--){if(pts[j].pct!==null){ctx.lineTo(pL+(cW/(pts.length-1))*j,pT+cH);break;}}
    ctx.lineTo(pL+(cW/(pts.length-1))*segStart,pT+cH);ctx.closePath();
    const grd=ctx.createLinearGradient(0,pT,0,pT+cH);grd.addColorStop(0,isDark?'rgba(88,166,255,.15)':'rgba(9,105,218,.1)');grd.addColorStop(1,'rgba(9,105,218,0)');ctx.fillStyle=grd;ctx.fill();
  }

  // Dots
  for(let i=0;i<pts.length;i++){
    if(pts[i].pct===null)continue;
    const x=pL+(cW/(pts.length-1))*i,y=pT+cH-(pts[i].pct/100)*cH;
    ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fillStyle=dotFill;ctx.fill();ctx.strokeStyle=bgCanvas;ctx.lineWidth=2;ctx.stroke();
  }
}

let showAllThoughts=false;
function renderAllThoughts(){
  const container=document.getElementById('all-thoughts-list'),all=[];
  for(const[ds,dd]of Object.entries(data.days||{}))for(const t of dd.thoughts||[])all.push({...t,date:ds});
  all.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  if(!all.length){container.innerHTML='<div style="font-size:12px;color:var(--fg-dim)">暂无想法记录</div>';return;}
  const display=showAllThoughts?all.slice(0,50):all.slice(0,3);
  let html=display.map(t=>{const d=new Date(t.createdAt);return `<div class="thought-history-item"><div class="thought-history-date"><span>${t.date}</span><span>${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}</span>${t.mood>=0?`<span>${MOODS[t.mood]}</span>`:''}</div><div class="thought-history-content">${escHtml(t.content)}</div></div>`;}).join('');
  if(all.length>3){
    html+=`<button onclick="showAllThoughts=!showAllThoughts;renderAllThoughts()" style="display:block;margin:8px auto 0;font-size:12px;color:var(--accent);padding:6px 16px;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer">
      ${showAllThoughts?'收起':'展开全部 ('+all.length+' 条)'}
    </button>`;
  }
  container.innerHTML=html;
}

// ═══ TEMPLATES ═══
function renderTemplates(){populateTagSelect('tpl-add-tag');initTimePicker('tpl-time-picker','','');renderTemplateTable();renderTagManager();}

function renderTemplateTable(){
  const tbody=document.getElementById('template-tbody'),sorted=[...data.templates].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  if(!sorted.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--fg-dim);padding:20px;">暂无模板</td></tr>';return;}
  tbody.innerHTML=sorted.map(t=>{const tag=getTag(t.tagId);const timeStr=fmtTimeRange(t.time,t.endTime);
    return `<tr><td class="tpl-time">${timeStr||'--:--'}</td><td style="color:var(--fg-emph)">${escHtml(t.title)}</td><td style="color:var(--fg-dim);font-size:12px">${escHtml(t.sub||'')}</td>
    <td>${tag?`<span style="color:${tag.color};font-size:12px">${escHtml(tag.name)}</span>`:''}</td>
    <td><div class="toggle-switch ${t.defaultShow?'on':''}" onclick="toggleTplDefault('${t.id}')"></div></td>
    <td style="display:flex;gap:6px"><button class="draft-btn draft-btn-edit" onclick="editTemplate('${t.id}')">编辑</button><button class="draft-btn draft-btn-del" onclick="deleteTemplate('${t.id}')">删除</button></td></tr>`;}).join('');
}

function addTemplate(){
  const title=document.getElementById('tpl-add-title').value.trim();if(!title)return;
  const r=resolveTimePicker('tpl-time-picker');
  data.templates.push({id:uid(),title,sub:document.getElementById('tpl-add-sub').value.trim(),
    time:r.time,endTime:r.endTime,
    tagId:document.getElementById('tpl-add-tag').value,defaultShow:true});
  document.getElementById('tpl-add-title').value='';document.getElementById('tpl-add-sub').value='';
  initTimePicker('tpl-time-picker','','');
  scheduleSave();renderTemplates();
}

function editTemplate(id){
  const tpl=data.templates.find(t=>t.id===id);if(!tpl)return;
  openModal('编辑模板',`<div style="display:flex;flex-direction:column;gap:8px;">
    <input type="text" id="modal-tpl-title" value="${escHtml(tpl.title)}" placeholder="标题">
    <input type="text" id="modal-tpl-sub" value="${escHtml(tpl.sub||'')}" placeholder="备注">
    <div class="time-picker" id="modal-tpl-tp"></div>
    <select id="modal-tpl-tag">${tagOptions(tpl.tagId)}</select></div>`,()=>{
    tpl.title=document.getElementById('modal-tpl-title').value.trim();tpl.sub=document.getElementById('modal-tpl-sub').value.trim();
    const r=resolveTimePicker('modal-tpl-tp');tpl.time=r.time;tpl.endTime=r.endTime;
    tpl.tagId=document.getElementById('modal-tpl-tag').value;scheduleSave();renderTemplates();closeModal();});
  setTimeout(()=>initTimePicker('modal-tpl-tp',tpl.time,tpl.endTime),0);
}
function deleteTemplate(id){data.templates=data.templates.filter(t=>t.id!==id);scheduleSave();renderTemplates();}

function toggleTplDefault(id){
  const tpl=data.templates.find(t=>t.id===id);if(!tpl)return;
  tpl.defaultShow=!tpl.defaultShow;
  // If toggled OFF, remove matching task from today
  if(!tpl.defaultShow){
    const td=dayData(today);
    td.tasks=td.tasks.filter(t=>!(t.title===tpl.title&&t.source==='template'));
  }
  // If toggled ON and not already in today, add it
  if(tpl.defaultShow){
    const td=dayData(today);
    if(!td.tasks.some(t=>t.title===tpl.title)){
      td.tasks.push({id:uid(),title:tpl.title,sub:tpl.sub||'',time:tpl.time||'',endTime:tpl.endTime||'',tagId:tpl.tagId||'',done:false,source:'template'});
    }
  }
  scheduleSave();renderTemplates();if(viewingDate===today)renderToday();
}

function renderTagManager(){
  document.getElementById('tag-list').innerHTML=data.tags.map(t=>`<span class="tag-chip" style="background:${t.color}18;color:${t.color}">${escHtml(t.name)} <span class="tag-chip-del" onclick="deleteTag('${t.id}')">✕</span></span>`).join('');
  document.getElementById('color-palette').innerHTML=PALETTE_COLORS.map(c=>`<div class="color-swatch ${selectedNewTagColor===c?'selected':''}" style="background:${c}" onclick="selectTagColor('${c}')"></div>`).join('');
}
function selectTagColor(c){selectedNewTagColor=c;renderTagManager();}
function addTag(){const n=document.getElementById('tag-add-name').value.trim();if(!n)return;data.tags.push({id:uid(),name:n,color:selectedNewTagColor});document.getElementById('tag-add-name').value='';scheduleSave();renderTemplates();}
function deleteTag(id){data.tags=data.tags.filter(t=>t.id!==id);data.templates.forEach(t=>{if(t.tagId===id)t.tagId='';});data.drafts.forEach(d=>{if(d.tagId===id)d.tagId='';});for(const d of Object.values(data.days||{}))(d.tasks||[]).forEach(t=>{if(t.tagId===id)t.tagId='';});scheduleSave();renderTemplates();}

// ═══ SETTINGS ═══
function renderSettings(){
  document.getElementById('set-username').value=settings.username||'';
  document.getElementById('set-shortcut').value=settings.globalShortcut||'Alt+Space';
  document.getElementById('set-autostart').classList.toggle('on',settings.launchAtLogin);
  document.getElementById('set-theme').value=settings.themeMode||'system';
}
function toggleAutostart(){settings.launchAtLogin=!settings.launchAtLogin;document.getElementById('set-autostart').classList.toggle('on',settings.launchAtLogin);}
function changeTheme(){settings.themeMode=document.getElementById('set-theme').value;if(window.dailyOS)window.dailyOS.getTheme().then(s=>applyTheme(settings.themeMode,s));else applyTheme(settings.themeMode,'light');}
async function saveSettingsUI(){
  settings.username=document.getElementById('set-username').value.trim()||'User';
  settings.globalShortcut=document.getElementById('set-shortcut').value.trim()||'Alt+Space';
  if(window.dailyOS)await window.dailyOS.saveSettings(settings);
  updateGreeting();const el=document.getElementById('save-status');el.textContent='设置已保存';el.style.opacity=1;setTimeout(()=>{el.style.opacity=0},2000);
}
async function exportAllData(){
  const json=window.dailyOS?await window.dailyOS.exportData():JSON.stringify(data,null,2);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));a.download=`dailyos-export-${today}.json`;a.click();
}
function importDataPrompt(){document.getElementById('import-file-input').click();}
document.getElementById('import-file-input')?.addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=async ev=>{try{const imp=JSON.parse(ev.target.result);if(window.dailyOS){await window.dailyOS.importData(ev.target.result);data=await window.dailyOS.getData();}else{data=imp;localStorage.setItem('dailyos-data',JSON.stringify(data));}ensureDay(today);renderAll();switchView(currentView);alert('导入成功！');}catch(err){alert('导入失败：'+err.message);}};
  r.readAsText(f);e.target.value='';
});

// ═══ MODAL & HELPERS ═══
function openModal(title,body,onConfirm){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=body;document.getElementById('edit-modal').classList.add('show');document.getElementById('modal-confirm').onclick=onConfirm;}
function closeModal(){document.getElementById('edit-modal').classList.remove('show');}
function populateTagSelect(id){const s=document.getElementById(id);if(!s)return;s.innerHTML='<option value="">无标签</option>'+data.tags.map(t=>`<option value="${t.id}">${escHtml(t.name)}</option>`).join('');}
function tagOptions(sel){return '<option value="">无标签</option>'+data.tags.map(t=>`<option value="${t.id}" ${t.id===sel?'selected':''}>${escHtml(t.name)}</option>`).join('');}

if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r=[r];const[tl]=r;this.moveTo(x+tl,y);this.lineTo(x+w-tl,y);this.arcTo(x+w,y,x+w,y+tl,tl);this.lineTo(x+w,y+h-tl);this.arcTo(x+w,y+h,x+w-tl,y+h,tl);this.lineTo(x+tl,y+h);this.arcTo(x,y+h,x,y+h-tl,tl);this.lineTo(x,y+tl);this.arcTo(x,y,x+tl,y,tl);this.closePath();return this;};}
let resizeTimer;window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{if(currentView==='insights')renderInsights();},200);});
init();
</script>
